title: guarded leaf transition — opens only once access is granted
steps:
  # granted is unset (null) -> guard fails -> no transition.
  - send: { signal: enter }
    expect:
      config: [locked]

  # Host supplies the external variable; the same signal now transitions.
  - data: { granted: true }
    send: { signal: enter }
    expect:
      config: [open]

  # open has no handler for enter -> event discarded, state unchanged.
  - send: { signal: enter }
    expect:
      config: [open]
