# full.yaml — exercises every harel feature (SPEC.md §4-§10) on an intuitive domain:
# a download manager. The `downloads` machine (root) spawns a `download` active
# object per file. Demonstrates: machine- and state-scoped data, guards (CEL),
# structured actions, spawning + messaging, defer, an orthogonal state with deep
# history, a timer, faults, contracts, and a version migration.

format: 1
id: downloads
version: 2
contracts: [download_manager]

data:                                   # machine-scoped (declared on the root)
  max_active: { type: int, init: 3, external: true }   # host setting
  active:     { type: int, init: 0 }                   # live count

signals:
  go_online: {}
  go_offline: {}
  add:           { payload: { url: { type: string, required: true } } }
  download_done: { payload: { id:  { type: string, required: true } } }

initial: offline

states:

  offline:
    # Queue add-requests while offline; replayed on the way into `online`.
    defer: [add]
    on:
      go_online: { target: online }

  online:
    on:
      go_offline: { target: offline }
      add:
        internal: true
        guard: "active < max_active"
        action:
          - spawn: { def: download, payload: { url: "event.payload.url" } }
          - assign: { active: "active + 1" }
      download_done:
        internal: true
        action:
          - assign: { active: "active - 1" }

# v1 named these states `up`/`down`; v2 renamed them. Migrate pinned v1 instances
# forward, but only when quiescent in one of those states (SPEC §10.2).
migrations:
  - from: 1
    to: 2
    when: "state == 'up' || state == 'down'"
    state_map: { up: online, down: offline }

---

# The spawned per-file machine. `url` is seeded from the spawn payload.
format: 1
id: download
version: 1
contracts: [download]

data:
  url:        { type: string }    # seeded from the spawn payload (by name)
  attempts:   { type: int, init: 0 }
  bytes_done: { type: int, init: 0 }    # total, persists across pause/resume

signals:
  connected: {}
  chunk: { payload: { bytes: { type: int, required: true } } }
  eof: {}
  hash_ok: {}
  hash_mismatch: {}
  pause: {}
  resume: {}

on_error: { target: failed }     # safety net for unexpected action errors (§5.9)

initial: active

states:

  # Transfer and integrity-check run concurrently. Deep history lets a paused
  # download resume both regions where they left off.
  active:
    type: orthogonal
    history: deep
    on:
      pause:    { target: paused }
      __done__: { target: done }     # generated when both regions reach final
    regions:

      # Region 1 — the byte transfer.
      - initial: connecting
        states:
          connecting:
            # Retry the connection up to 3 times, 10s apart (timer via clock §5.8).
            after:
              - duration: 10s
                guard: "attempts < 3"
                target: connecting          # re-enter -> re-arm the timer
                action: [ { assign: { attempts: "attempts + 1" } } ]
            on:
              connected: { target: receiving }
          receiving:
            data:
              session_bytes: { type: int, init: 0 }   # state-scoped: resets each entry
            on:
              chunk:
                internal: true
                action:
                  - assign: { session_bytes: "session_bytes + event.payload.bytes" }
                  - assign: { bytes_done:    "bytes_done + event.payload.bytes" }
              eof: { target: stored }
          stored: { type: final }

      # Region 2 — integrity check, concurrent with the transfer.
      - initial: hashing
        states:
          hashing:
            on:
              hash_ok:       { target: verified }
              hash_mismatch: { target: failed }   # exits the orthogonal state entirely
          verified: { type: final }

  paused:
    on:
      resume: { target: active }    # deep history restores both regions
                                    # (re-entering `receiving` re-inits session_bytes)

  done:
    type: final
    entry:
      - emit: { signal: download_done, payload: { id: "url" } }

  failed:
    entry:
      - emit: { signal: download_done, payload: { id: "url" } }
      - stop: {}
